
<!DOCTYPE html>
<html lang="zh-cn">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>KILL极域</title>
	<link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
	<style>
	  body {
		background: url("../bg.png") no-repeat center center fixed;
		background-size: cover;
		margin: 0;
		font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
	  }
	  .text {
		color: #fff;
		text-shadow: 1px 1px 4px #000;
	  }
	  .main-card {
		max-width: 700px;
		margin: 48px auto 0 auto;
		background: rgba(255,255,255,0.10);
		border-radius: 18px;
		box-shadow: 0 8px 32px rgba(0,0,0,0.18);
		padding: 32px 24px 24px;
		display: flex;
		flex-direction: column;
		align-items: center;
	  }
	  h1.text {
		text-align: center;
		margin-top: 0;
	  }
	  .main-desc {
		text-align: center;
		color: #fff;
		text-shadow: 1px 1px 4px #000;
		margin-bottom: 24px;
	  }
	  .main-btn {
		width: 100%;
		background: #fff;
		color: #222;
		border: none;
		border-radius: 8px;
		padding: 16px 0;
		font-size: 1.1rem;
		margin-bottom: 16px;
		cursor: pointer;
		box-shadow: 0 2px 8px rgba(0,0,0,0.08);
		transition: background 0.2s, color 0.2s;
		text-align: center;
		font-weight: 500;
		display: block;
	  }
	  .main-btn:hover {
		background: #111;
		color: #fff;
	  }
	  @media (max-width: 800px) {
		.main-card {
		  max-width: 98vw;
		  padding: 16px 2vw;
		}
		.main-btn {
		  font-size: 1rem;
		  padding: 12px 0;
		}
	  }
	</style>
</head>
<body>
	<div class="main-card">
		<h1 class="text">KILL极域</h1>
		<div class="main-desc">极域破解相关工具下载</div>
		<button class="main-btn tra">下载JiYuTrainer</button>
		<button class="main-btn txs">下载极域反控制</button>
		<button class="main-btn jys">下载Astrum For Online Classroom</button>
		<button class="main-btn back">返回主页</button>
		<p class="main-desc">本页面和上述软件没有任何关系，使用后果自负</p>
	</div>
	<script>
	  // 跳转链接映射
		const links = {
			tra: 'https://github.com/imengyu/JiYuTrainer/releases/download/latest/JiYuTrainer.exe',
			txs: 'https://wwiy.lanzouj.com/iZwTm1c819zc',
			jys: 'https://gitee.com/gscceo/download/releases/download/4.5.2/Astrum For Online Classroom 4.5.2.exe',
			back: '../'
		};
	  document.querySelectorAll('.main-btn').forEach(btn => {
		for (const cls of btn.classList) {
		  if (links[cls]) {
			btn.addEventListener('click', () => {
			  window.location.href = links[cls];
			});
			break;
		  }
		}
	  });
	</script>
</body>
</html>
