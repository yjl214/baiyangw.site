<!DOCTYPE html>
<html lang="zh-cn">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>白杨的网站</title>
	<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
<style>
  body {
	background: url("bg.png") no-repeat center center fixed;
	background-size: cover;
	margin: 0;
	font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
  }
  .text {
	color: #fff;
	text-shadow: 1px 1px 4px #000;
  }
  .main-card {
	max-width: 700px;
	margin: 48px auto 0 auto;
	background: rgba(255,255,255,0.10);
	border-radius: 18px;
	box-shadow: 0 8px 32px rgba(0,0,0,0.18);
	padding: 32px 24px 24px;
	display: flex;
	flex-direction: column;
	align-items: center;
  }
  h1.text {
	text-align: center;
	margin-top: 0;
  }
  .main-desc {
	text-align: center;
	color: #fff;
	text-shadow: 1px 1px 4px #000;
	margin-bottom: 24px;
  }
  .main-btn {
	width: 100%;
	background: #fff;
	color: #222;
	border: none;
	border-radius: 8px;
	padding: 16px 0;
	font-size: 1.1rem;
	margin-bottom: 16px;
	cursor: pointer;
	box-shadow: 0 2px 8px rgba(0,0,0,0.08);
	transition: background 0.2s, color 0.2s;
	text-align: center;
	font-weight: 500;
	display: block;
  }
  .main-btn:hover {
	background: #111;
	color: #fff;
  }
  @media (max-width: 800px) {
	.main-card {
	  max-width: 98vw;
	  padding: 16px 2vw;
	}
	.main-btn {
	  font-size: 1rem;
	  padding: 12px 0;
	}
  }
</style>
</head>
<body>
	<div class="main-card">
		<h1 class="text" style="cursor:pointer">白杨的网站</h1>
		<div class="main-desc">欢迎来到白杨的网站！</div>
		<button class="main-btn pcl">下载Minecraft启动器</button>
		<button class="main-btn stukill">KILL极域</button>
		<button class="main-btn meng">孟老师的生平</button>
		<button class="main-btn man">Man! Craft Launcher</button>
		<button class="main-btn files">网站文件下载（提取码请联系站长）</button>
		<button class="main-btn gh">我的GitHub主页</button>
		<button class="main-btn bz">我的B站主页</button>
		<p class="main-desc">本页面和上述软件没有任何关系，也与Minecraft无关</p>
	</div>
	<script>
	  const links = {
		bz: 'https://space.bilibili.com/3546377382529470',
		gh: 'https://github.com/yjl214',
		man: './mancraft-launcher',
		meng: './mengrip/',
		stukill: './stukillrip',
		pcl: './mcl',
		h1: 'https://baiyangw.qzz.io',
		files: 'https://yjl214.lanzn.com/b00yakgi0f'
	  };
	  document.querySelectorAll('.main-btn').forEach(btn => {
		for (const cls of btn.classList) {
		  if (links[cls]) {
			btn.addEventListener('click', () => {
			  window.location.href = links[cls];
			});
			break;
		  }
		}
	  });
	  document.querySelector('h1.text').addEventListener('click', function() {
		window.location.href = links.h1;
	  });
	</script>
</body>
</html>
