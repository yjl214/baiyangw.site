<!DOCTYPE html>
<html lang="zh-cn">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>下载Minecraft启动器</title>
	<link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
	<style>
	  body {
		background: url("../bg.png") no-repeat center center fixed;
		background-size: cover;
		margin: 0;
		font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
	  }
	  .text {
		color: #fff;
		text-shadow: 1px 1px 4px #000;
	  }
	  .main-card {
		max-width: 700px;
		margin: 48px auto 0 auto;
		background: rgba(255,255,255,0.10);
		border-radius: 18px;
		box-shadow: 0 8px 32px rgba(0,0,0,0.18);
		padding: 32px 24px 24px;
		display: flex;
		flex-direction: column;
		align-items: center;
	  }
	  h1.text {
		text-align: center;
		margin-top: 0;
	  }
	  .main-desc {
		text-align: center;
		color: #fff;
		text-shadow: 1px 1px 4px #000;
		margin-bottom: 24px;
	  }
	  .main-btn {
		width: 100%;
		background: #fff;
		color: #222;
		border: none;
		border-radius: 8px;
		padding: 16px 0;
		font-size: 1.1rem;
		margin-bottom: 16px;
		cursor: pointer;
		box-shadow: 0 2px 8px rgba(0,0,0,0.08);
		transition: background 0.2s, color 0.2s;
		text-align: center;
		font-weight: 500;
		display: block;
	  }
	  .main-btn:hover {
		background: #111;
		color: #fff;
	  }
	  @media (max-width: 800px) {
		.main-card {
		  max-width: 98vw;
		  padding: 16px 2vw;
		}
		.main-btn {
		  font-size: 1rem;
		  padding: 12px 0;
		}
	  }
	</style>
</head>
<body>
	<div class="main-card">
		<h1 class="text">下载Minecraft启动器</h1>
		<div class="main-desc">下载Minecraft启动器</div>
		<button class="main-btn pclm">下载PCL2</button>
		<button class="main-btn pclce">下载PCL CE</button>
		<button class="main-btn hmcl">下载HMCL</button>
		<button class="main-btn laiuncherx">下载LaunchherX</button>
		<button class="main-btn luanti">下载Luanti</button>
		<p class="main-desc">本页面不附属于上述启动器的任何开发组织，与Mojang、Microsoft及Minecraft无关</p>
		<button class="main-btn back">返回主页</button>
	</div>
	<script>
	  // 跳转链接映射
	  const links = {
		pclm: 'https://www.mczwlt.net/resource/6ejd6cyq',
		pclce: 'https://www.mczwlt.net/resource/vtiqore4',
		hmcl: 'https://www.mczwlt.net/resource/xoh6u70y',
		laiuncherx: 'https://www.mczwlt.net/resource/1gg07pi2',
		luanti: 'https://www.mczwlt.net/resource/ihsluh60',
		back: '../'
	  };
	  document.querySelectorAll('.main-btn').forEach(btn => {
		for (const cls of btn.classList) {
		  if (links[cls]) {
			btn.addEventListener('click', () => {
			  window.location.href = links[cls];
			});
			break;
		  }
		}
	  });
	</script>
</body>
</html>
