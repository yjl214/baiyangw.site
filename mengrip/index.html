<!DOCTYPE html>
<html lang="zh-cn">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>孟老师的生平</title>
	<link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
	<style>
		.main-card {
			max-width: 700px;
			margin: 48px auto 0 auto;
			background: rgba(255,255,255,0.10);
			border-radius: 18px;
			box-shadow: 0 8px 32px rgba(0,0,0,0.18);
			padding: 32px 24px 24px 24px;
			display: flex;
			flex-direction: column;
			align-items: center;
		}
		.main-btn {
			width: 100%;
			background: #fff;
			color: #222;
			border: none;
			border-radius: 8px;
			padding: 16px 0;
			font-size: 1.1rem;
			margin-bottom: 16px;
			cursor: pointer;
			box-shadow: 0 2px 8px rgba(0,0,0,0.08);
			transition: background 0.2s, color 0.2s;
			text-align: center;
			font-weight: 500;
			display: block;
		}
		.main-btn:hover {
			background: #111;
			color: #fff;
		}
		h1.text {
			text-align: center;
			margin-top: 0;
		}
		@media (max-width: 800px) {
			.main-card {
				max-width: 98vw;
				padding: 16px 2vw;
			}
			.main-btn {
				font-size: 1rem;
				padding: 12px 0;
			}
		}
		body {
			background: url("../bg.png") no-repeat center center fixed;
			background-size: cover;
			margin: 0;
			font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
		}
		.text {
			color: #fff;
			text-shadow: 1px 1px 4px #000;
		}
		button {
			background: #fff;
			color: #222;
			border: none;
			border-radius: 6px;
			padding: 10px 24px;
			font-size: 1rem;
			margin-bottom: 10px;
			cursor: pointer;
			box-shadow: 0 2px 8px rgba(0,0,0,0.08);
			transition: background 0.2s, color 0.2s;
		}
		button:hover {
			background: #111;
			color: #fff;
		}

	</style>
</head>
<body>
	<div style="max-width:700px;margin:48px auto 0 auto;">
		<div class="main-card" style="margin-top:0;">
			<h1 class="text" style="margin-top:0;">孟老师的生平</h1>
			<p class="text" style="margin-bottom:0;">作师，教场戏于火，逐出。又至清泉寺，教场加钠，博众眼，虽钠爆，亦留青烟在，三百余人足以飞升。卒！</p>
			<p class="main-desc" style="margin-top:16px;">本页面只是一个玩笑</p>
			<button class="main-btn" style="margin-top:24px;" onclick="window.location.href='../'">返回主页</button>
		</div>
	</div>
</body>
</html>
